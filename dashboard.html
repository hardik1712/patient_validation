<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FracAnnotate Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { padding: 40px; background-color: var(--bg); color: var(--text); }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .stat-card { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
    .stat-card h3 { font-size: 0.9rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 10px; }
    .stat-card .value { font-size: 2.5rem; font-weight: bold; color: var(--accent); }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; }
    .chart-container { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; margin-top: 40px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase; }
  </style>
</head>
<body>

  <div class="dashboard-header">
    <h1>FracAnnotate Results Dashboard</h1>
    <div style="display: flex; gap: 12px; align-items: center;">
      <a href="/" class="btn btn-secondary">← Back to App</a>
      <button id="logoutBtn" class="btn btn-secondary" style="border-color: var(--error); color: var(--error); cursor: pointer;">Log Out</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <h3>Total Submissions</h3>
      <div class="value" id="totalSubmissions">0</div>
    </div>
    <div class="stat-card">
      <h3>Total Images Ranked</h3>
      <div class="value" id="totalImages">0</div>
    </div>
    <div class="stat-card">
      <h3>Unique Annotators</h3>
      <div class="value" id="uniqueAnnotators">0</div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-container">
      <h3>Average Rank (Lower is Better)</h3>
      <canvas id="avgRankChart"></canvas>
    </div>
    <div class="chart-container">
      <h3>Win Rate (#1 Ranks)</h3>
      <canvas id="winRateChart"></canvas>
    </div>
  </div>

  <div class="chart-container" style="margin-top: 30px;">
    <h3>Recent Submissions</h3>
    <table>
      <thead>
        <tr>
          <th>Annotator ID</th>
          <th>Completed At</th>
          <th>Images</th>
        </tr>
      </thead>
      <tbody id="recentSubmissionsBody">
      </tbody>
    </table>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
